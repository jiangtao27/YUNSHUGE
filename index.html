<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云书阁 - 专业读书平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .reader-content { font-family: 'Noto Serif SC', serif; line-height: 1.8; }
        .book-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass-effect { background: rgba(30, 30, 30, 0.9); }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .vip-badge { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .free-badge { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }
        
        /* 阅读主题 */
        .theme-default { background-color: #ffffff; color: #1a202c; }
        .theme-dark { background-color: #1a202c; color: #e2e8f0; }
        .theme-sepia { background-color: #f4ecd8; color: #433422; }
        .theme-green { background-color: #e8f5e9; color: #1b5e20; }
        
        /* 目录树样式 */
        .toc-item { cursor: pointer; transition: all 0.2s; }
        .toc-item:hover { background-color: rgba(59, 130, 246, 0.1); color: #2563eb; }
        
        /* HTML内容容器 */
        .html-content iframe { width: 100%; height: 100%; border: none; }
        .html-content { position: relative; }
    </style>
<base target="_blank">
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

    <!-- 登录界面 -->
    <div id="loginScreen" class="fixed inset-0 z-50 bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4 animate-fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 shadow-lg">
                    书
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">云书阁</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2">沉浸式阅读体验</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">用户名</label>
                    <input type="text" id="loginUsername" required placeholder="输入用户名 (试玩: user/admin)" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密码</label>
                    <input type="password" id="loginPassword" required placeholder="任意密码" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
                <div class="flex justify-between text-sm text-gray-500 dark:text-gray-400">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="mr-2 rounded text-blue-600 focus:ring-blue-500"> 记住我
                    </label>
                    <a href="#" class="hover:text-blue-600 transition-colors">忘记密码?</a>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    登录
                </button>
            </form>
            
            <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700">
                <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-3">试玩账号</p>
                <div class="grid grid-cols-3 gap-2 text-xs">
                    <button onclick="quickLogin('user')" class="px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-700 dark:text-gray-300">
                        普通用户
                    </button>
                    <button onclick="quickLogin('vip')" class="px-3 py-2 bg-purple-100 dark:bg-purple-900/30 rounded-lg hover:bg-purple-200 dark:hover:bg-purple-900/50 transition-colors text-purple-700 dark:text-purple-300">
                        VIP用户
                    </button>
                    <button onclick="quickLogin('admin')" class="px-3 py-2 bg-red-100 dark:bg-red-900/30 rounded-lg hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors text-red-700 dark:text-red-300">
                        管理员
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主应用容器（初始隐藏） -->
    <div id="mainApp" class="hidden min-h-screen flex-col">
        
        <!-- 顶部导航 -->
        <header class="glass-effect sticky top-0 z-40 border-b border-gray-200 dark:border-gray-700 transition-colors duration-300">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('home')">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">
                            书
                        </div>
                        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">
                            云书阁
                        </h1>
                    </div>
                    
                    <!-- 搜索栏 -->
                    <div class="hidden md:flex flex-1 max-w-lg mx-8">
                        <div class="relative w-full">
                            <input type="text" id="searchInput" placeholder="搜索书名、作者..." 
                                class="w-full pl-10 pr-4 py-2 rounded-full border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-700 transition-all"
                                onkeyup="searchBooks(this.value)">
                            <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                    </div>

                    <div class="flex items-center space-x-4">
                        <!-- 管理员入口 -->
                        <button id="adminBtn" onclick="showPage('admin')" class="hidden px-4 py-2 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm font-medium hover:bg-red-200 dark:hover:bg-red-900/50 transition-all">
                            管理后台
                        </button>

                        <!-- 用户菜单 -->
                        <div class="relative" id="userMenu">
                            <button onclick="toggleUserDropdown()" class="flex items-center space-x-2 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-sm font-bold" id="userAvatar">
                                    U
                                </div>
                                <span class="hidden sm:block text-sm font-medium text-gray-700 dark:text-gray-200" id="userDisplayName">用户</span>
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            
                            <!-- 下拉菜单 -->
                            <div id="userDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 py-2 z-50">
                                <div class="px-4 py-2 border-b border-gray-200 dark:border-gray-700">
                                    <p class="text-sm font-medium text-gray-900 dark:text-white" id="dropdownUsername">用户名</p>
                                    <p class="text-xs text-gray-500 dark:text-gray-400" id="dropdownRole">普通用户</p>
                                </div>
                                <a href="#" onclick="showPage('profile'); return false;" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">个人中心</a>
                                <a href="#" onclick="showPage('bookshelf'); return false;" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">我的书架</a>
                                <a href="#" onclick="showPage('history'); return false;" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">阅读记录</a>
                                <div class="border-t border-gray-200 dark:border-gray-700 mt-2 pt-2">
                                    <a href="#" onclick="logout(); return false;" class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30">退出登录</a>
                                </div>
                            </div>
                        </div>

                        <button onclick="openUploadModal()" id="addBookBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full font-medium transition-all shadow-lg hover:shadow-xl flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            <span class="hidden sm:inline">添加书籍</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            
            <!-- 首页 -->
            <div id="page-home" class="page-section">
                <!-- 统计栏 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="text-2xl font-bold text-gray-900 dark:text-white mb-1" id="statTotal">0</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">总藏书</div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="text-2xl font-bold text-blue-600 dark:text-blue-400 mb-1" id="statFree">0</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">免费</div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="text-2xl font-bold text-purple-600 dark:text-purple-400 mb-1" id="statVip">0</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">会员</div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="text-2xl font-bold text-orange-600 dark:text-orange-400 mb-1" id="statReading">0</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">阅读中</div>
                    </div>
                </div>

                <!-- 最近阅读 -->
                <div id="recentSection" class="mb-8 hidden">
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        最近阅读
                    </h2>
                    <div id="recentBooks" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
                </div>

                <!-- 筛选标签 -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="filterBooks('all')" class="filter-btn active px-5 py-2 rounded-full bg-blue-600 text-white text-sm font-medium transition-all" data-filter="all">
                        全部书籍
                    </button>
                    <button onclick="filterBooks('free')" class="filter-btn px-5 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-700" data-filter="free">
                        免费
                    </button>
                    <button onclick="filterBooks('vip')" class="filter-btn px-5 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-700" data-filter="vip">
                        会员专享
                    </button>
                    <button onclick="filterBooks('html')" class="filter-btn px-5 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-700" data-filter="html">
                        网页书籍
                    </button>
                    <button onclick="filterBooks('txt')" class="filter-btn px-5 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-700" data-filter="txt">
                        文本书籍
                    </button>
                </div>

                <!-- 书籍网格 -->
                <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                
                <!-- 空状态 -->
                <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
                    <div class="w-24 h-24 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mb-4">
                        <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-2">暂无书籍</h3>
                    <p class="text-gray-500 dark:text-gray-400 mb-4">点击右上角添加您的第一本电子书</p>
                </div>
            </div>

            <!-- 管理员后台 -->
            <div id="page-admin" class="page-section hidden">
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">管理员控制台</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                        <h3 class="font-bold text-lg mb-4 text-gray-900 dark:text-white">用户管理</h3>
                        <div class="space-y-3" id="adminUserList">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 lg:col-span-2">
                        <h3 class="font-bold text-lg mb-4 text-gray-900 dark:text-white">书籍管理</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-300">
                                    <tr>
                                        <th class="px-4 py-3 rounded-l-lg">书名</th>
                                        <th class="px-4 py-3">作者</th>
                                        <th class="px-4 py-3">类型</th>
                                        <th class="px-4 py-3">权限</th>
                                        <th class="px-4 py-3 rounded-r-lg">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="adminBookList" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 阅读统计页面 -->
            <div id="page-profile" class="page-section hidden">
                <div class="max-w-2xl mx-auto">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">阅读统计</h2>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-sm border border-gray-100 dark:border-gray-700 mb-6">
                        <div class="flex items-center justify-between mb-6">
                            <div>
                                <p class="text-sm text-gray-500 dark:text-gray-400">本周阅读时长</p>
                                <p class="text-3xl font-bold text-gray-900 dark:text-white mt-1" id="weeklyReadingTime">0 分钟</p>
                            </div>
                            <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center">
                                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                        </div>
                        <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600 w-3/4 rounded-full"></div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">比上周多阅读 25%</p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 text-center">
                            <div class="text-3xl font-bold text-purple-600 mb-1" id="totalBooksRead">0</div>
                            <div class="text-sm text-gray-500 dark:text-gray-400">已读完</div>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 text-center">
                            <div class="text-3xl font-bold text-orange-600 mb-1" id="totalNotes">0</div>
                            <div class="text-sm text-gray-500 dark:text-gray-400">读书笔记</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 阅读器界面（全屏覆盖） -->
    <div id="reader" class="fixed inset-0 z-50 bg-white transform translate-y-full transition-transform duration-300 flex flex-col hidden">
        <!-- 阅读器头部 -->
        <div class="glass-effect border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button onclick="closeReader()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                    <svg class="w-6 h-6 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="hidden md:block">
                    <h2 id="readerTitle" class="text-lg font-bold text-gray-900 dark:text-white truncate max-w-md">书名</h2>
                    <p id="readerAuthor" class="text-xs text-gray-500 dark:text-gray-400">作者</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2">
                <!-- 目录按钮 -->
                <button onclick="toggleToc()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors relative" title="目录">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                </button>
                
                <!-- 添加书签 -->
                <button onclick="toggleBookmark()" id="bookmarkBtn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" title="添加书签">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                </button>

                <!-- 主题设置 -->
                <div class="relative" id="themeMenu">
                    <button onclick="toggleThemeDropdown()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
                    </button>
                    <div id="themeDropdown" class="hidden absolute right-0 mt-2 w-40 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 py-2 z-50">
                        <button onclick="setReaderTheme('default')" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">默认白</button>
                        <button onclick="setReaderTheme('dark')" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">暗夜黑</button>
                        <button onclick="setReaderTheme('sepia')" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">羊皮纸</button>
                        <button onclick="setReaderTheme('green')" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">护眼绿</button>
                    </div>
                </div>

                <!-- 字体大小 -->
                <div class="flex items-center space-x-1 bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
                    <button onclick="changeFontSize(-1)" class="px-2 py-1 text-xs font-bold text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-700 rounded">A-</button>
                    <button onclick="changeFontSize(1)" class="px-2 py-1 text-sm font-bold text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-700 rounded">A+</button>
                </div>
            </div>
        </div>

        <!-- 阅读内容区（带目录侧边栏） -->
        <div class="flex-1 flex overflow-hidden relative">
            <!-- 目录侧边栏 -->
            <div id="tocSidebar" class="w-0 bg-gray-50 dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto transition-all duration-300">
                <div class="p-4">
                    <h3 class="font-bold text-gray-900 dark:text-white mb-4">目录</h3>
                    <div id="tocContent" class="space-y-1 text-sm"></div>
                </div>
            </div>

            <!-- 内容 -->
            <div id="readerContainer" class="flex-1 overflow-y-auto scroll-hide relative">
                <div id="readerContent" class="reader-content max-w-3xl mx-auto px-6 py-12 text-lg transition-all duration-300 min-h-full">
                    <!-- 内容注入 -->
                </div>
            </div>
        </div>

        <!-- 底部进度条 -->
        <div class="glass-effect border-t border-gray-200 dark:border-gray-700 px-6 py-2 flex justify-between items-center text-xs text-gray-500 dark:text-gray-400">
            <span id="readingProgress">0%</span>
            <div class="flex-1 mx-4 h-1 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden cursor-pointer" onclick="clickProgress(event)">
                <div id="progressBar" class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="wordCount">0 字</span>
        </div>
    </div>

    <!-- 添加书籍模态框 -->
    <div id="uploadModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity" onclick="closeUploadModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg pointer-events-auto transform scale-100 transition-all animate-fade-in max-h-[90vh] overflow-y-auto">
                <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center sticky top-0 bg-white dark:bg-gray-800 z-10">
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white">添加新书籍</h3>
                    <button onclick="closeUploadModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <form id="uploadForm" class="p-6 space-y-5">
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">选择文件 (TXT 或 HTML)</label>
                        <div class="relative border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-6 hover:border-blue-500 transition-colors">
                            <input type="file" id="bookFile" accept=".txt,.html,.htm" required 
                                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                onchange="updateFileName(this)">
                            <div class="text-center">
                                <svg class="w-10 h-10 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p class="text-sm text-gray-600 dark:text-gray-400" id="fileName">点击或拖拽文件到此处</p>
                                <p class="text-xs text-gray-400 mt-1">支持 .txt 和 .html 格式</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">书名 *</label>
                            <input type="text" id="bookTitle" required placeholder="输入书名" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">作者</label>
                            <input type="text" id="bookAuthor" placeholder="输入作者" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">分类</label>
                        <select id="bookCategory" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500">
                            <option value="小说">小说</option>
                            <option value="文学">文学</option>
                            <option value="技术">技术</option>
                            <option value="历史">历史</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">访问权限</label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="relative flex cursor-pointer">
                                <input type="radio" name="access" value="free" checked class="sr-only peer">
                                <div class="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 peer-checked:border-green-500 peer-checked:bg-green-50 dark:peer-checked:bg-green-900/30 transition-all text-center">
                                    <div class="font-medium text-gray-900 dark:text-white">免费阅读</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">所有用户可访问</div>
                                </div>
                            </label>
                            <label class="relative flex cursor-pointer">
                                <input type="radio" name="access" value="vip" class="sr-only peer">
                                <div class="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 peer-checked:border-purple-500 peer-checked:bg-purple-50 dark:peer-checked:bg-purple-900/30 transition-all text-center">
                                    <div class="font-medium text-gray-900 dark:text-white">会员专享</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">仅会员可阅读</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">封面颜色</label>
                        <div class="flex space-x-3">
                            <button type="button" onclick="selectColor('blue')" class="color-btn w-10 h-10 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-blue-500 transition-all" data-color="blue"></button>
                            <button type="button" onclick="selectColor('red')" class="color-btn w-10 h-10 rounded-full bg-red-500 opacity-60 hover:opacity-100 transition-all" data-color="red"></button>
                            <button type="button" onclick="selectColor('green')" class="color-btn w-10 h-10 rounded-full bg-green-500 opacity-60 hover:opacity-100 transition-all" data-color="green"></button>
                            <button type="button" onclick="selectColor('purple')" class="color-btn w-10 h-10 rounded-full bg-purple-500 opacity-60 hover:opacity-100 transition-all" data-color="purple"></button>
                            <button type="button" onclick="selectColor('orange')" class="color-btn w-10 h-10 rounded-full bg-orange-500 opacity-60 hover:opacity-100 transition-all" data-color="orange"></button>
                        </div>
                        <input type="hidden" id="coverColor" value="blue">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                        添加书籍
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-gray-700 text-white px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center space-x-2">
        <svg id="toastIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toastMessage">提示消息</span>
    </div>

    <script>
        // 数据存储
        let books = JSON.parse(localStorage.getItem('cloudBooks')) || [];
        let users = JSON.parse(localStorage.getItem('cloudUsers')) || [
            { username: 'admin', password: 'admin', role: 'admin', isVip: true },
            { username: 'user', password: 'user', role: 'user', isVip: false },
            { username: 'vip', password: 'vip', role: 'user', isVip: true }
        ];
        let currentUser = null;
        let currentFilter = 'all';
        let currentFontSize = 18;
        let currentBookId = null;
        let bookmarks = JSON.parse(localStorage.getItem('cloudBookmarks')) || {};
        let readingStats = JSON.parse(localStorage.getItem('cloudStats')) || {};
        let currentTheme = localStorage.getItem('readerTheme') || 'default';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 检查登录状态
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainApp();
            }
            
            // 阅读进度监听
            const readerContainer = document.getElementById('readerContainer');
            readerContainer.addEventListener('scroll', updateReadingProgress);
        });

        // 登录系统
        function quickLogin(type) {
            const credentials = {
                'user': { username: 'user', password: 'user' },
                'vip': { username: 'vip', password: 'vip' },
                'admin': { username: 'admin', password: 'admin' }
            };
            const cred = credentials[type];
            document.getElementById('loginUsername').value = cred.username;
            document.getElementById('loginPassword').value = cred.password;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                showMainApp();
                showToast('登录成功');
            } else {
                showToast('用户名或密码错误', 'error');
            }
        });

        function showMainApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('flex');
            
            // 更新UI
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('userDisplayName').textContent = currentUser.username;
            document.getElementById('dropdownUsername').textContent = currentUser.username;
            document.getElementById('dropdownRole').textContent = currentUser.role === 'admin' ? '管理员' : (currentUser.isVip ? 'VIP会员' : '普通用户');
            
            // 管理员权限
            if (currentUser.role === 'admin') {
                document.getElementById('adminBtn').classList.remove('hidden');
                document.getElementById('addBookBtn').classList.remove('hidden');
            } else {
                document.getElementById('adminBtn').classList.add('hidden');
                // 普通用户只能添加免费书籍（或者根据需要隐藏）
                document.getElementById('addBookBtn').classList.remove('hidden');
            }
            
            renderBooks();
            updateStats();
            renderRecentBooks();
            updateProfileStats();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            location.reload();
        }

        function toggleUserDropdown() {
            document.getElementById('userDropdown').classList.toggle('hidden');
        }

        // 页面导航
        function showPage(page) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById('userDropdown').classList.add('hidden');
            
            if (page === 'admin') renderAdminPanel();
            if (page === 'profile') updateProfileStats();
        }

        // 修复后的书籍渲染
        function renderBooks(booksToRender = null) {
            const grid = document.getElementById('booksGrid');
            const emptyState = document.getElementById('emptyState');
            const displayBooks = booksToRender || books.filter(b => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'free') return b.access === 'free';
                if (currentFilter === 'vip') return b.access === 'vip';
                if (currentFilter === 'html') return b.type === 'html';
                if (currentFilter === 'txt') return b.type === 'txt';
                return true;
            });

            if (displayBooks.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            grid.innerHTML = displayBooks.map((book, index) => {
                const isLocked = book.access === 'vip' && !currentUser.isVip && currentUser.role !== 'admin';
                return `
                <div class="book-card bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden cursor-pointer group animate-fade-in" 
                     style="animation-delay: ${index * 50}ms"
                     onclick="openBook(${book.id})">
                    
                    <div class="h-48 bg-gradient-to-br ${getGradient(book.coverColor)} relative overflow-hidden">
                        <div class="absolute inset-0 flex items-center justify-center p-6">
                            <h3 class="text-white font-bold text-xl text-center drop-shadow-md line-clamp-3">${escapeHtml(book.title)}</h3>
                        </div>
                        <div class="absolute top-3 right-3">
                            ${book.access === 'vip' 
                                ? '<span class="vip-badge text-white text-xs px-2 py-1 rounded-full font-medium shadow-lg">VIP</span>' 
                                : '<span class="free-badge text-white text-xs px-2 py-1 rounded-full font-medium shadow-lg">免费</span>'}
                        </div>
                        ${isLocked ? `
                            <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center backdrop-blur-sm">
                                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </div>
                        ` : ''}
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/50 to-transparent p-3">
                            <span class="text-white text-xs opacity-90">${book.category || '未分类'}</span>
                        </div>
                    </div>

                    <div class="p-5">
                        <h3 class="font-bold text-gray-900 dark:text-white text-lg mb-1 line-clamp-1" title="${escapeHtml(book.title)}">${escapeHtml(book.title)}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">${escapeHtml(book.author || '未知作者')}</p>
                        
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-2">
                                <span class="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 rounded">${book.type.toUpperCase()}</span>
                                ${book.lastRead ? '<span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse" title="阅读中"></span>' : ''}
                            </div>
                            ${currentUser.role === 'admin' ? `
                            <button onclick="event.stopPropagation(); deleteBook(${book.id})" 
                                class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // 修复后的打开书籍函数 - 解决HTML显示问题
        function openBook(id) {
            const book = books.find(b => b.id === id);
            if (!book) return;

            // 权限检查
            if (book.access === 'vip' && !currentUser.isVip && currentUser.role !== 'admin') {
                showToast('该书籍为会员专享，请先升级会员');
                return;
            }

            currentBookId = id;
            document.getElementById('readerTitle').textContent = book.title;
            document.getElementById('readerAuthor').textContent = (book.author || '未知作者') + ' · ' + (book.category || '未分类');
            
            const contentDiv = document.getElementById('readerContent');
            const reader = document.getElementById('reader');
            
            // 设置阅读器主题
            setReaderTheme(currentTheme);
            
            if (book.type === 'html') {
                // 修复：使用更安全的方式显示HTML
                // 清理HTML内容，移除脚本，提取body内容
                let htmlContent = book.content;
                
                // 创建临时解析器
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                // 提取body内容或整个文档
                const bodyContent = doc.body ? doc.body.innerHTML : htmlContent;
                
                // 清理脚本标签（安全考虑）
                const cleanContent = bodyContent.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
                
                // 包裹在div中以便控制样式
                contentDiv.innerHTML = `
                    <div class="html-book-content prose dark:prose-invert max-w-none">
                        ${cleanContent}
                    </div>
                `;
                
                // 提取目录（H1-H3标签）
                extractTOC(doc);
            } else {
                // TXT处理：智能分段
                const paragraphs = book.content.split(/\n\s*\n/).filter(p => p.trim());
                contentDiv.innerHTML = paragraphs.map((p, idx) => {
                    // 检测是否是章节标题（短小、无标点、数字开头等特征）
                    const isChapter = /^[\s\d一二三四五六七八九十百千万零]+[章节卷集部篇].*$/.test(p) || 
                                     (p.length < 20 && !/[。，！？,.;:"']/.test(p));
                    if (isChapter) {
                        return `<h2 class="text-2xl font-bold mt-8 mb-4 text-gray-900 dark:text-white border-b pb-2 border-gray-200 dark:border-gray-700" id="chapter-${idx}">${escapeHtml(p)}</h2>`;
                    }
                    return `<p class="mb-6 text-justify indent-8 leading-relaxed">${escapeHtml(p)}</p>`;
                }).join('');
                
                // 为TXT生成简单目录
                generateSimpleTOC(contentDiv);
            }

            // 恢复阅读进度
            setTimeout(() => {
                const container = document.getElementById('readerContainer');
                const progress = book.progress || 0;
                container.scrollTop = (container.scrollHeight - container.clientHeight) * progress;
                
                // 记录最近阅读
                book.lastRead = new Date().toISOString();
                saveBooks();
                renderRecentBooks();
            }, 100);

            // 更新书签状态
            updateBookmarkBtn();
            
            // 显示阅读器
            reader.classList.remove('hidden');
            setTimeout(() => {
                reader.classList.remove('translate-y-full');
            }, 10);
            
            // 记录阅读统计
            recordReadingStart();
        }

        // 提取HTML目录
        function extractTOC(doc) {
            const tocContainer = document.getElementById('tocContent');
            const headers = doc.querySelectorAll('h1, h2, h3, h4');
            
            if (headers.length === 0) {
                tocContainer.innerHTML = '<p class="text-gray-500 text-xs">未检测到目录结构</p>';
                return;
            }
            
            tocContainer.innerHTML = Array.from(headers).map((h, idx) => {
                const level = parseInt(h.tagName.charAt(1));
                const indent = (level - 1) * 12;
                return `<div class="toc-item py-1 px-2 rounded text-gray-700 dark:text-gray-300 truncate" 
                         style="padding-left: ${indent}px" 
                         onclick="scrollToHeader(${idx})">${escapeHtml(h.textContent)}</div>`;
            }).join('');
            
            // 给内容中的标题添加id以便跳转
            const contentHeaders = document.getElementById('readerContent').querySelectorAll('h1, h2, h3, h4');
            contentHeaders.forEach((h, idx) => {
                h.id = `header-${idx}`;
                h.classList.add('cursor-pointer', 'hover:text-blue-600', 'transition-colors');
            });
        }

        // 为TXT生成简单目录
        function generateSimpleTOC(contentDiv) {
            const tocContainer = document.getElementById('tocContent');
            const chapters = contentDiv.querySelectorAll('h2');
            
            if (chapters.length === 0) {
                tocContainer.innerHTML = '<p class="text-gray-500 text-xs">未检测到章节</p>';
                return;
            }
            
            tocContainer.innerHTML = Array.from(chapters).map((ch, idx) => {
                return `<div class="toc-item py-1 px-2 rounded text-gray-700 dark:text-gray-300 truncate" 
                         onclick="document.getElementById('chapter-${Array.from(contentDiv.children).indexOf(ch)}').scrollIntoView({behavior: 'smooth'})">
                         ${escapeHtml(ch.textContent)}
                      </div>`;
            }).join('');
        }

        function scrollToHeader(idx) {
            const header = document.getElementById(`header-${idx}`);
            if (header) {
                header.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function closeReader() {
            // 保存进度
            const container = document.getElementById('readerContainer');
            const scrollPercent = container.scrollTop / (container.scrollHeight - container.clientHeight);
            const book = books.find(b => b.id === currentBookId);
            if (book) {
                book.progress = isNaN(scrollPercent) ? 0 : scrollPercent;
                saveBooks();
            }
            
            document.getElementById('reader').classList.add('translate-y-full');
            setTimeout(() => {
                document.getElementById('reader').classList.add('hidden');
            }, 300);
            
            // 关闭目录
            document.getElementById('tocSidebar').style.width = '0';
        }

        function updateReadingProgress() {
            const container = document.getElementById('readerContainer');
            const scrollPercent = Math.round((container.scrollTop / (container.scrollHeight - container.clientHeight)) * 100);
            const percent = isNaN(scrollPercent) ? 0 : scrollPercent;
            document.getElementById('readingProgress').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function clickProgress(e) {
            const bar = e.currentTarget;
            const clickX = e.offsetX;
            const width = bar.clientWidth;
            const percent = clickX / width;
            const container = document.getElementById('readerContainer');
            container.scrollTop = (container.scrollHeight - container.clientHeight) * percent;
        }

        // 目录切换
        function toggleToc() {
            const sidebar = document.getElementById('tocSidebar');
            const currentWidth = sidebar.style.width;
            sidebar.style.width = currentWidth === '280px' ? '0' : '280px';
        }

        // 主题设置
        function toggleThemeDropdown() {
            document.getElementById('themeDropdown').classList.toggle('hidden');
        }

        function setReaderTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('readerTheme', theme);
            const content = document.getElementById('readerContent');
            const container = document.getElementById('readerContainer');
            
            // 移除所有主题类
            container.classList.remove('theme-default', 'theme-dark', 'theme-sepia', 'theme-green');
            container.classList.add(`theme-${theme}`);
            
            // 针对dark主题特殊处理
            if (theme === 'dark') {
                document.getElementById('reader').classList.add('dark');
            } else {
                document.getElementById('reader').classList.remove('dark');
            }
            
            document.getElementById('themeDropdown').classList.add('hidden');
        }

        // 书签功能
        function toggleBookmark() {
            if (!currentBookId) return;
            
            if (!bookmarks[currentBookId]) {
                bookmarks[currentBookId] = [];
            }
            
            const container = document.getElementById('readerContainer');
            const scrollPercent = Math.round((container.scrollTop / (container.scrollHeight - container.clientHeight)) * 100);
            
            // 检查是否已存在相同位置的书签（允许5%误差）
            const exists = bookmarks[currentBookId].some(b => Math.abs(b.percent - scrollPercent) < 5);
            
            if (exists) {
                // 删除书签
                bookmarks[currentBookId] = bookmarks[currentBookId].filter(b => Math.abs(b.percent - scrollPercent) >= 5);
                showToast('书签已移除');
            } else {
                // 添加书签
                bookmarks[currentBookId].push({
                    percent: scrollPercent,
                    timestamp: new Date().toISOString(),
                    preview: document.getElementById('readerContent').textContent.substring(0, 50) + '...'
                });
                showToast('书签已添加');
            }
            
            localStorage.setItem('cloudBookmarks', JSON.stringify(bookmarks));
            updateBookmarkBtn();
        }

        function updateBookmarkBtn() {
            const btn = document.getElementById('bookmarkBtn');
            const container = document.getElementById('readerContainer');
            const scrollPercent = Math.round((container.scrollTop / (container.scrollHeight - container.clientHeight)) * 100);
            
            if (bookmarks[currentBookId] && bookmarks[currentBookId].some(b => Math.abs(b.percent - scrollPercent) < 5)) {
                btn.classList.add('text-blue-600', 'bg-blue-50', 'dark:bg-blue-900/30');
                btn.classList.remove('text-gray-600', 'dark:text-gray-300');
            } else {
                btn.classList.remove('text-blue-600', 'bg-blue-50', 'dark:bg-blue-900/30');
                btn.classList.add('text-gray-600', 'dark:text-gray-300');
            }
        }

        // 添加书籍
        function updateFileName(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                document.getElementById('fileName').textContent = file.name;
                
                // 自动填充书名（移除扩展名）
                const fileName = file.name.replace(/\.(txt|html|htm)$/i, '');
                if (!document.getElementById('bookTitle').value) {
                    document.getElementById('bookTitle').value = fileName;
                }
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('bookFile');
            const file = fileInput.files[0];
            
            if (!file) {
                showToast('请选择文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const type = file.name.endsWith('.html') || file.name.endsWith('.htm') ? 'html' : 'txt';
                
                // 非管理员只能添加免费书籍（可选逻辑）
                const access = document.querySelector('input[name="access"]:checked').value;
                if (currentUser.role !== 'admin' && access === 'vip') {
                    showToast('只有管理员可以添加VIP书籍');
                    return;
                }
                
                const newBook = {
                    id: Date.now(),
                    title: document.getElementById('bookTitle').value,
                    author: document.getElementById('bookAuthor').value,
                    category: document.getElementById('bookCategory').value,
                    access: access,
                    coverColor: document.getElementById('coverColor').value,
                    type: type,
                    content: content,
                    addedAt: new Date().toISOString(),
                    addedBy: currentUser.username,
                    progress: 0,
                    lastRead: null
                };
                
                books.push(newBook);
                saveBooks();
                renderBooks();
                updateStats();
                closeUploadModal();
                showToast('书籍添加成功！');
                
                document.getElementById('uploadForm').reset();
                document.getElementById('fileName').textContent = '点击或拖拽文件到此处';
                selectColor('blue');
            };
            
            reader.readAsText(file);
        });

        function deleteBook(id) {
            if (!confirm('确定要删除这本书吗？')) return;
            books = books.filter(b => b.id !== id);
            delete bookmarks[id];
            saveBooks();
            renderBooks();
            updateStats();
            showToast('已删除');
        }

        function filterBooks(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === type) {
                    btn.classList.remove('bg-white', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-300', 'border', 'border-gray-200', 'dark:border-gray-700');
                    btn.classList.add('bg-blue-600', 'text-white');
                } else {
                    btn.classList.add('bg-white', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-300', 'border', 'border-gray-200', 'dark:border-gray-700');
                    btn.classList.remove('bg-blue-600', 'text-white');
                }
            });
            renderBooks();
        }

        function searchBooks(keyword) {
            if (!keyword) {
                renderBooks();
                return;
            }
            const filtered = books.filter(b => 
                b.title.toLowerCase().includes(keyword.toLowerCase()) || 
                b.author.toLowerCase().includes(keyword.toLowerCase()) ||
                (b.category && b.category.includes(keyword))
            );
            renderBooks(filtered);
        }

        // 最近阅读
        function renderRecentBooks() {
            const recent = books.filter(b => b.lastRead).sort((a, b) => new Date(b.lastRead) - new Date(a.lastRead)).slice(0, 4);
            const container = document.getElementById('recentBooks');
            const section = document.getElementById('recentSection');
            
            if (recent.length === 0) {
                section.classList.add('hidden');
                return;
            }
            
            section.classList.remove('hidden');
            container.innerHTML = recent.map(book => `
                <div onclick="openBook(${book.id})" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer hover:shadow-md transition-all">
                    <div class="flex items-center space-x-3">
                        <div class="w-12 h-16 bg-gradient-to-br ${getGradient(book.coverColor)} rounded shadow-sm flex-shrink-0"></div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-gray-900 dark:text-white truncate">${escapeHtml(book.title)}</h4>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">继续阅读 ${Math.round((book.progress || 0) * 100)}%</p>
                            <div class="w-full bg-gray-200 dark:bg-gray-700 h-1 rounded-full mt-2">
                                <div class="bg-blue-600 h-1 rounded-full" style="width: ${(book.progress || 0) * 100}%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 管理员面板
        function renderAdminPanel() {
            // 用户列表
            const userList = document.getElementById('adminUserList');
            userList.innerHTML = users.map(u => `
                <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div>
                        <div class="font-medium text-gray-900 dark:text-white">${u.username}</div>
                        <div class="text-xs text-gray-500">${u.role === 'admin' ? '管理员' : (u.isVip ? 'VIP' : '普通用户')}</div>
                    </div>
                    ${u.role !== 'admin' ? `
                    <button onclick="toggleUserVip('${u.username}')" class="text-xs px-3 py-1 rounded-full ${u.isVip ? 'bg-purple-100 text-purple-700' : 'bg-gray-200 text-gray-700'}">
                        ${u.isVip ? '取消VIP' : '设为VIP'}
                    </button>
                    ` : '<span class="text-xs text-gray-500">管理员</span>'}
                </div>
            `).join('');
            
            // 书籍列表
            const bookList = document.getElementById('adminBookList');
            bookList.innerHTML = books.map(b => `
                <tr class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                    <td class="px-4 py-3 font-medium text-gray-900 dark:text-white">${escapeHtml(b.title)}</td>
                    <td class="px-4 py-3 text-gray-600 dark:text-gray-400">${escapeHtml(b.author || '-')}</td>
                    <td class="px-4 py-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-blue-900 dark:text-blue-300">${b.type}</span>
                    </td>
                    <td class="px-4 py-3">
                        <span class="${b.access === 'vip' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'} text-xs font-medium px-2.5 py-0.5 rounded dark:bg-gray-700 dark:text-gray-300">
                            ${b.access === 'vip' ? 'VIP' : '免费'}
                        </span>
                    </td>
                    <td class="px-4 py-3">
                        <button onclick="deleteBook(${b.id})" class="font-medium text-red-600 dark:text-red-500 hover:underline">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function toggleUserVip(username) {
            const user = users.find(u => u.username === username);
            if (user) {
                user.isVip = !user.isVip;
                localStorage.setItem('cloudUsers', JSON.stringify(users));
                renderAdminPanel();
                showToast(`${username} 已${user.isVip ? '设为' : '取消'}VIP`);
            }
        }

        // 统计功能
        function recordReadingStart() {
            if (!currentBookId) return;
            const today = new Date().toDateString();
            if (!readingStats[today]) readingStats[today] = 0;
            
            // 简化的阅读时长统计（实际应用需要更复杂的逻辑）
            const startTime = Date.now();
            window.currentReadingStart = startTime;
        }

        function updateProfileStats() {
            // 计算本周阅读时长（模拟数据）
            const today = new Date();
            let weekMinutes = 0;
            for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const key = d.toDateString();
                weekMinutes += (readingStats[key] || 0);
            }
            document.getElementById('weeklyReadingTime').textContent = weekMinutes + ' 分钟';
            
            // 已读完书籍（进度>95%）
            const finished = books.filter(b => b.progress > 0.95).length;
            document.getElementById('totalBooksRead').textContent = finished;
            
            // 笔记数（这里用书签数代替演示）
            const totalNotes = Object.values(bookmarks).reduce((sum, arr) => sum + arr.length, 0);
            document.getElementById('totalNotes').textContent = totalNotes;
        }

        // 工具函数
        function saveBooks() {
            localStorage.setItem('cloudBooks', JSON.stringify(books));
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = books.length;
            document.getElementById('statFree').textContent = books.filter(b => b.access === 'free').length;
            document.getElementById('statVip').textContent = books.filter(b => b.access === 'vip').length;
            document.getElementById('statReading').textContent = books.filter(b => b.lastRead).length;
        }

        function getGradient(color) {
            const gradients = {
                blue: 'from-blue-400 to-blue-600',
                red: 'from-red-400 to-red-600',
                green: 'from-green-400 to-green-600',
                purple: 'from-purple-400 to-purple-600',
                orange: 'from-orange-400 to-orange-600',
                gray: 'from-gray-600 to-gray-800'
            };
            return gradients[color] || gradients.blue;
        }

        function selectColor(color) {
            document.getElementById('coverColor').value = color;
            document.querySelectorAll('.color-btn').forEach(btn => {
                if (btn.dataset.color === color) {
                    btn.classList.remove('opacity-60');
                    btn.classList.add('ring-2', 'ring-offset-2');
                } else {
                    btn.classList.add('opacity-60');
                    btn.classList.remove('ring-2', 'ring-offset-2');
                }
            });
        }

        function openUploadModal() {
            document.getElementById('uploadModal').classList.remove('hidden');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.add('hidden');
        }

        function changeFontSize(delta) {
            currentFontSize += delta * 2;
            currentFontSize = Math.max(14, Math.min(32, currentFontSize));
            document.getElementById('readerContent').style.fontSize = currentFontSize + 'px';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMessage').textContent = message;
            
            if (type === 'success') {
                icon.classList.remove('hidden', 'text-red-400');
                icon.classList.add('text-green-400');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';
            } else {
                icon.classList.remove('hidden', 'text-green-400');
                icon.classList.add('text-red-400');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            }
            
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // 点击外部关闭下拉菜单
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#userMenu')) {
                document.getElementById('userDropdown').classList.add('hidden');
            }
            if (!e.target.closest('#themeMenu')) {
                document.getElementById('themeDropdown').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
